<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Flight Reservation System</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Custom Styles -->
    <link rel="stylesheet" th:href="@{/styles.css}" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">
          <i class="bi bi-airplane"></i> FlightReserve
        </a>

        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="/"> <i class="bi bi-house"></i> Home </a>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="auth-container">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6">
            <div class="card auth-card">
              <div class="card-header text-center">
                <h4 class="mb-0">
                  <i class="bi bi-person-plus"></i> Create Account
                </h4>
              </div>
              <div class="card-body">
                <form
                  th:action="@{/auth/signup}"
                  th:object="${passenger}"
                  method="post"
                >
                  <div class="row">
                    <div class="col-md-6">
                      <div class="mb-3">
                        <label for="firstname" class="form-label">
                          <i class="bi bi-person"></i> First Name
                        </label>
                        <input
                          type="text"
                          class="form-control"
                          id="firstname"
                          th:field="*{firstname}"
                          th:class="${#fields.hasErrors('firstname')} ? 'form-control is-invalid' : 'form-control'"
                          required
                        />
                        <div
                          th:if="${#fields.hasErrors('firstname')}"
                          class="invalid-feedback"
                          th:errors="*{firstname}"
                        ></div>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="mb-3">
                        <label for="lastname" class="form-label">
                          <i class="bi bi-person"></i> Last Name
                        </label>
                        <input
                          type="text"
                          class="form-control"
                          id="lastname"
                          th:field="*{lastname}"
                          th:class="${#fields.hasErrors('lastname')} ? 'form-control is-invalid' : 'form-control'"
                          required
                        />
                        <div
                          th:if="${#fields.hasErrors('lastname')}"
                          class="invalid-feedback"
                          th:errors="*{lastname}"
                        ></div>
                      </div>
                    </div>
                  </div>

                  <div class="mb-3">
                    <label for="email" class="form-label">
                      <i class="bi bi-envelope"></i> Email Address
                    </label>
                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      th:field="*{email}"
                      th:class="${#fields.hasErrors('email')} ? 'form-control is-invalid' : 'form-control'"
                      required
                    />
                    <div
                      th:if="${#fields.hasErrors('email')}"
                      class="invalid-feedback"
                      th:errors="*{email}"
                    ></div>
                  </div>

                  <div class="mb-3">
                    <label for="password" class="form-label">
                      <i class="bi bi-lock"></i> Password
                    </label>
                    <input
                      type="password"
                      class="form-control"
                      id="password"
                      th:field="*{password}"
                      th:class="${#fields.hasErrors('password')} ? 'form-control is-invalid' : 'form-control'"
                      minlength="6"
                      required
                    />
                    <div
                      th:if="${#fields.hasErrors('password')}"
                      class="invalid-feedback"
                      th:errors="*{password}"
                    ></div>
                    <div class="form-text">
                      Password must be at least 6 characters long.
                    </div>
                  </div>

                  <div class="mb-3">
                    <label for="address" class="form-label">
                      <i class="bi bi-geo-alt"></i> Address
                    </label>
                    <input
                      type="text"
                      class="form-control"
                      id="address"
                      th:field="*{address}"
                      th:class="${#fields.hasErrors('address')} ? 'form-control is-invalid' : 'form-control'"
                    />
                    <div
                      th:if="${#fields.hasErrors('address')}"
                      class="invalid-feedback"
                      th:errors="*{address}"
                    ></div>
                  </div>

                  <div class="row">
                    <div class="col-md-6">
                      <div class="mb-3">
                        <label for="city" class="form-label">
                          <i class="bi bi-building"></i> City
                        </label>
                        <input
                          type="text"
                          class="form-control"
                          id="city"
                          th:field="*{city}"
                          th:class="${#fields.hasErrors('city')} ? 'form-control is-invalid' : 'form-control'"
                        />
                        <div
                          th:if="${#fields.hasErrors('city')}"
                          class="invalid-feedback"
                          th:errors="*{city}"
                        ></div>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="mb-3">
                        <label for="postalCode" class="form-label">
                          <i class="bi bi-mailbox"></i> Postal Code
                        </label>
                        <input
                          type="text"
                          class="form-control"
                          id="postalCode"
                          th:field="*{postalCode}"
                          th:class="${#fields.hasErrors('postalCode')} ? 'form-control is-invalid' : 'form-control'"
                        />
                        <div
                          th:if="${#fields.hasErrors('postalCode')}"
                          class="invalid-feedback"
                          th:errors="*{postalCode}"
                        ></div>
                      </div>
                    </div>
                  </div>

                  <!-- Global errors -->
                  <div
                    th:if="${#fields.hasGlobalErrors()}"
                    class="alert alert-danger"
                    role="alert"
                  >
                    <i class="bi bi-exclamation-triangle"></i>
                    <div
                      th:each="e : ${#fields.globalErrors()}"
                      th:text="${e}"
                    ></div>
                  </div>

                  <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                      <i class="bi bi-person-plus"></i> Create Account
                    </button>
                  </div>
                </form>

                <hr class="my-4" />

                <div class="text-center">
                  <p class="mb-0">Already have an account?</p>
                  <a href="/auth/login" class="btn btn-outline-primary">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                  </a>
                </div>
              </div>
            </div>

            <div class="text-center mt-3">
              <a href="/" class="text-decoration-none">
                <i class="bi bi-arrow-left"></i> Back to Home
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="row">
          <div class="col-md-6">
            <h5><i class="bi bi-airplane"></i> FlightReserve</h5>
            <p>Your trusted partner for flight reservations worldwide.</p>
          </div>
          <div class="col-md-6 text-md-end">
            <p>Designed by Farouk Oladega for Enterprise Java, Assignment 2</p>
          </div>
        </div>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
